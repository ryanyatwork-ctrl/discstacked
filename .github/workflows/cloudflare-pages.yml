name: Deploy To Cloudflare Pages

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build production assets
        run: npm run build:cloudflare

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name != 'pull_request'
    concurrency:
      group: cloudflare-pages-${{ github.ref }}
      cancel-in-progress: true
    env:
      PROJECT_NAME: discstacked
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production assets
        run: npm run build:cloudflare

      - name: Confirm Cloudflare secrets are configured
        shell: bash
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_ACCOUNT_ID}"
          test -n "${CLOUDFLARE_API_TOKEN}"

      - name: Ensure Cloudflare Pages project exists
        shell: bash
        run: |
          set -euo pipefail
          if npx wrangler pages project list --json | node -e "const fs=require('fs'); const projects=JSON.parse(fs.readFileSync(0,'utf8')); process.exit(projects.some((p)=>p.name===process.argv[1]) ? 0 : 1)" "$PROJECT_NAME"; then
            echo "Pages project $PROJECT_NAME already exists."
          else
            npx wrangler pages project create "$PROJECT_NAME" --production-branch main
          fi

      - name: Deploy to Cloudflare Pages
        shell: bash
        run: |
          set -euo pipefail
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          npx wrangler pages deploy dist --project-name="$PROJECT_NAME" --branch="$BRANCH_NAME"
