name: Deploy To Cloudflare Pages

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip verify (tests + build check) and deploy directly"
        required: false
        default: "false"

permissions:
  contents: read
  deployments: write

jobs:
  verify:
    if: github.event.inputs.skip_tests != 'true'
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: https://ykyneinxsgcdjejmlxkg.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_MEfAwZY-IqPSvGtrARNOCw_7N793vNp
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end smoke tests
        run: npm run test:e2e

      - name: Run unit tests
        run: npm test

      - name: Build production assets
        run: npm run build:cloudflare

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      (needs.verify.result == 'success' || needs.verify.result == 'skipped')
    concurrency:
      group: cloudflare-pages-${{ github.ref }}
      cancel-in-progress: true
    env:
      PROJECT_NAME: discstacked
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      VITE_SUPABASE_URL: https://ykyneinxsgcdjejmlxkg.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_MEfAwZY-IqPSvGtrARNOCw_7N793vNp
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production assets
        run: npm run build:cloudflare

      - name: Confirm CLOUDFLARE_API_TOKEN is configured
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is not set."
            echo "::error::Go to GitHub repo → Settings → Secrets and variables → Actions and add CLOUDFLARE_API_TOKEN."
            echo "::error::Create the token at dash.cloudflare.com → My Profile → API Tokens with 'Cloudflare Pages: Edit' permission."
            exit 1
          fi

      - name: Ensure Cloudflare Pages project exists
        shell: bash
        run: |
          set -euo pipefail
          output="$(npx wrangler pages project create "$PROJECT_NAME" --production-branch main 2>&1)" || status=$?
          status="${status:-0}"
          if [ "$status" -eq 0 ]; then
            echo "$output"
            echo "Pages project $PROJECT_NAME created."
          elif printf '%s' "$output" | grep -qi "already exists"; then
            echo "$output"
            echo "Pages project $PROJECT_NAME already exists."
          else
            echo "$output"
            exit "$status"
          fi

      - name: Deploy to Cloudflare Pages
        shell: bash
        run: |
          set -euo pipefail
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          npx wrangler pages deploy dist --project-name="$PROJECT_NAME" --branch="$BRANCH_NAME"
